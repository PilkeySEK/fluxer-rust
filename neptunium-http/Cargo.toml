[package]
name = "neptunium-http"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
async-trait = "0.1.89"
bon = "3.9.0"
neptunium-model = { path = "../neptunium-model" }
futures = { version = "0.3.32", features = ["alloc"] }
percent-encoding = "2.3.2"
rand = "0.10.0"
reqwest = { version = "0.13.2", features = ["query"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_path_to_error = "0.1.20"
tracing = "0.1.44"
zeroize = "1.8.2"
serde_repr = "0.1.20"

[lints.clippy]
pedantic = "warn"
new-without-default = "allow"

[features]
default = []
user_api = ["neptunium-model/user_api"]

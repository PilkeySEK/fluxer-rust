[package]
name = "neptunium-http"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Interacting with the Fluxer HTTP API."
repository = "https://github.com/PilkeySEK/fluxer-neptunium"
readme = "README.md"
keywords = ["api", "fluxer"]
publish = true

[dependencies]
async-trait = "0.1.89"
bon = "3.9.0"
neptunium-model = { path = "../neptunium-model", version = "0.1.0" }
futures = { version = "0.3.32", features = ["alloc"] }
percent-encoding = "2.3.2"
rand = "0.10.0"
reqwest = { version = "0.13.2", features = ["query"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_path_to_error = "0.1.20"
tracing = "0.1.44"
zeroize = "1.8.2"
serde_repr = "0.1.20"

[features]
default = []
user_api = ["neptunium-model/user_api"]
